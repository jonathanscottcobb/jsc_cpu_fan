name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-22.04 # older base = wider glibc compatibility for the AppImage
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake qt6-base-dev \
            libgl1-mesa-dev dpkg-dev \
            libfuse2 file wget

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      # -------- Debian package --------
      - name: Build .deb
        working-directory: build
        run: cpack -G DEB

      # -------- AppImage --------
      - name: Install into AppDir
        run: |
          DESTDIR="$PWD/AppDir" cmake --install build
          # linuxdeploy expects usr/ at the AppDir root
          find AppDir

      - name: Fetch linuxdeploy + Qt plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: Build AppImage
        env:
          QMAKE: /usr/bin/qmake6
          OUTPUT: jsc-cpu-x86_64.AppImage
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --desktop-file AppDir/usr/share/applications/jsc-cpu.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/jsc-cpu.svg \
            --output appimage

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp build/*.deb dist/ || true
          cp *.AppImage dist/ || true
          ls -l dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jsc-cpu-packages
          path: dist/*

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.AppImage
          generate_release_notes: true
